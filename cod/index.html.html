<!DOCTYPE html>
<html>
<head>
  <title>iPhone 17</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:Arial; background:#f2f2f2;">

  <div style="position:relative; width:100%; max-width:500px; margin:auto;">

    <!-- IMAGEM DO IPHONE -->
    <img src="iphone.png" style="width:100%; display:block;">

    <!-- FORM -->
    <div style="
      position:absolute;
      top:40%;
      left:50%;
      transform:translate(-50%, -50%);
      width:80%;
    ">

      <div style="
        background:#cfcfcf;
        padding:20px;
        border-radius:25px;
        text-align:center;
      ">

        <div style="color:#caa63a; font-size:24px; font-weight:bold; margin-bottom:15px;">
          Bem - Vindo!
        </div>

        <div style="text-align:left; font-weight:bold;">E-mail:</div>
        <input id="email" placeholder="Exemplo@gmail.com"
          style="width:100%; padding:12px; border-radius:20px; border:none; margin-bottom:10px;">

        <div style="text-align:left; font-weight:bold;">Senha:</div>
        <input id="senha" type="password" placeholder="********"
          style="width:100%; padding:12px; border-radius:20px; border:none; margin-bottom:10px;">

        <div style="color:#caa63a; font-size:14px; margin-bottom:10px;">
          Esqueceu sua senha?
        </div>

        <button onclick="entrar()" 
          style="width:100%; padding:12px; border-radius:20px; border:none; background:#fff; color:#caa63a; font-weight:bold;">
          ENTRAR
        </button>

      </div>

    </div>

  </div>

  <script>
    function entrar() {
      var email = document.getElementById("email").value;
      var senha = document.getElementById("senha").value;

      if (email == "" || senha == "") {
        alert("Preencha tudo!");
      } else {
        alert("Login funcionando!");
      }
    }
  </script>

</body>
</html>
