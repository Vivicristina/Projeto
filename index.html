<!DOCTYPE html>
<html>
<head>
  <title>App</title>
</head>

<body style="display:flex; justify-content:center; margin-top:50px; font-family:Arial;">

  <div style="position: relative; width: 300px;">

    <!-- SUA IMAGEM DO IPHONE -->
    <img src="iphone.png" style="width:100%;">

    <!-- CONTEÚDO EM CIMA -->
    <div style="position: absolute; top: 150px; left: 30px; width: 240px; text-align:center;">

      <h3>Cadastro</h3>

      <input id="email" placeholder="Email" style="width:100%; margin-bottom:10px;"><br>

      <input id="senha" type="password" placeholder="Senha" style="width:100%; margin-bottom:10px;"><br>

      <button onclick="cadastrar()" style="width:100%;">Cadastrar</button>

    </div>

  </div>

  <script>
    function cadastrar() {
      let email = document.getElementById("email").value;
      let senha = document.getElementById("senha").value;

      if (email == "" || senha == "") {
        alert("Preencha tudo!");
      } else {
        alert("Funcionou!");
      }
    }
  </script>

</body>
</html>
