<!DOCTYPE html>
<html>
<head>
  <title>iPhone 17</title>
</head>

<body style="display:flex; justify-content:center; margin-top:50px; font-family:Arial;">

  <div style="position:relative; width:300px;">

    <!-- IMAGEM -->
    <img src="iPhone 17.Pagamento.png" style="width:100%; display:block;">

    <!-- CONTEÚDO -->
    <div style="
      position:absolute;
      top:35%;
      left:50%;
      transform:translate(-50%, -50%);
      width:80%;
      text-align:center;
    ">

      <h3>Bem-vindo</h3>

      <input id="email" placeholder="Email" style="width:100%; margin-bottom:10px;"><br>

      <input id="senha" type="password" placeholder="Senha" style="width:100%; margin-bottom:10px;"><br>

      <button onclick="entrar()" style="width:100%;">Entrar</button>

    </div>

  </div>

  <script>
    function entrar() {
      var email = document.getElementById("email").value;
      var senha = document.getElementById("senha").value;

      if (email == "" || senha == "") {
        alert("Preencha tudo!");
      } else {
        alert("Funcionou!");
      }
    }
  </script>

</body>
</html>
