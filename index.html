<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Projeto Perseus - Mobile</title>
<style>
       /* Define o fundo cinza e centraliza o celular */
       body {
           background-color: #f4f4f4;
           display: flex;
           flex-direction: column;
           align-items: center;
           justify-content: center;
           min-height: 100vh;
           margin: 0;
           font-family: Arial, sans-serif;
           padding: 20px;
       }
       /* Estiliza o título */
       h1 {
           color: #b8962e; /* O dourado do seu projeto */
           margin-bottom: 20px;
           font-size: 24px;
       }
       /* Desenha a moldura do celular e esconde o que sai para fora */
       .celular-moldura {
           width: 300px;
           height: 600px;
           background: white;
           border: 12px solid #333; /* Borda preta grossa do aparelho */
           border-radius: 40px; /* Bordas arredondadas do celular */
           box-shadow: 0 20px 40px rgba(0,0,0,0.15); /* Sombra para profundidade */
           overflow: hidden; /* Corta a imagem para ela ficar dentro */
           display: flex;
           justify-content: center;
           align-items: center;
       }
       /* Faz a imagem preencher o espaço do celular sem distorcer */
       .imagem-app {
           width: 100%;
           height: 100%;
           object-fit: cover; /* Recorta a imagem para preencher sem deformar */
       }
</style>
</head>
<body>
<h1>Projeto Perseus - Mobile</h1>
<div class="celular-moldura">
<img src="iPhone 17 - Pagamento.png" alt="Tela do meu App" class="imagem-app">
</div>
</body>
</html>
