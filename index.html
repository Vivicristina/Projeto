<!DOCTYPE html>
<html>
<body style="margin:0; text-align:center; font-family:Arial;">

<div style="position:relative; max-width:400px; margin:auto;">

  <img src="iphone.png" style="width:100%;">

  <div style="position:absolute; top:45%; left:50%; transform:translate(-50%,-50%); width:70%;">

    <input id="email" placeholder="Email" style="width:100%;"><br><br>
    <input id="senha" type="password" placeholder="Senha" style="width:100%;"><br><br>

    <button onclick="ok()">Entrar</button>

  </div>

</div>

<script>
function ok(){
  var e = document.getElementById("email").value;
  var s = document.getElementById("senha").value;

  if(e==""||s==""){
    alert("Preencha!");
  }else{
    alert("Funcionou!");
  }
}
</script>

</body>
</html>
