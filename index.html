<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Projeto Perseus</title>
<style>
       body {
           font-family: Arial, sans-serif;
           background-color: #f4f4f4;
           display: flex;
           flex-direction: column;
           align-items: center;
           padding: 50px;
       }
       h1 {
           margin-bottom: 20px;
       }
       .celular-moldura {
           width: 300px;
           height: 600px;
           background: white;
           border: 10px solid #333; /* Borda do aparelho */
           border-radius: 40px;
           box-shadow: 0 20px 40px rgba(0,0,0,0.2);
           overflow: hidden;
           display: flex;
           justify-content: center;
           align-items: center;
       }
       .imagem-app {
           width: 100%;
           height: 100%;
           object-fit: cover; 
       }
</style>
</head>
<body>
<h1>Projeto Perseus - Mobile</h1>
<div class="celular-moldura">
<img src="iPhone 17 - Pagamento.png" alt="Tela do meu App" class="imagem-app">
</div>
